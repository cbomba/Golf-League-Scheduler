<html>
<head>
<title>Golf League Scheduler</title>
<style>

table{
border-collapse:collapse;
font-size:14px;
}

th,td{
border:1px solid #999;
padding:4px 6px;
}

#schedule{
overflow-x:auto;
}

</style>
</head>
<body>
<h1>Golf League Scheduler</h1>

<div style="display:flex; justify-content:space-between; align-items:flex-start; gap:40px;">

  <div style="flex:3;">

    <h3>League Setup</h3>

    <label>
    <input type="checkbox" id="menCheck"> Men's League
    </label>

    <input type="number" id="menCount" placeholder="Number of men" min="4">

    <br><br>

    <label>
    <input type="checkbox" id="womenCheck"> Women's League
    </label>

    <input type="number" id="womenCount" placeholder="Number of women" min="4">

    <br><br>

    <label>League Start Date</label>
    <input type="date" id="leagueStartDate">

    <label>League End Date</label>
    <input type="date" id="leagueEndDate">

    <label>First Tee Time</label>
    <input type="time" id="startTime" value="16:28">

    <br><br>

    <h4 style="margin:0 0 8px 0;">Days Played</h4>

    <label><input type="checkbox" value="mon" class="dow"> Mon</label>
    <label><input type="checkbox" value="tue" class="dow"> Tue</label>
    <label><input type="checkbox" value="wed" class="dow" checked> Wed</label>
    <label><input type="checkbox" value="thu" class="dow"> Thu</label>
    <label><input type="checkbox" value="fri" class="dow"> Fri</label>
    <label><input type="checkbox" value="sat" class="dow"> Sat</label>
    <label><input type="checkbox" value="sun" class="dow"> Sun</label>

    <br><br>

    Group Order

    <select id="placement">
      <option value="mixed_alternating">Mixed</option>
      <option value="women_first">Women First</option>
      <option value="women_last">Women Last</option>
    </select>

    <br><br>

    <button onclick="generate()">Generate Schedule</button>
    <button onclick="exportExcel()">Export to Excel</button>
    <button onclick="saveSchedule()">Save & Share</button>

  </div>

  <div id="leagueStats" style="flex:1; min-width:260px; border:1px solid #ccc; padding:12px; border-radius:8px; background:#fafafa;">
    <h3 style="margin-top:0;">League Stats</h3>
    <div id="leagueStatsContent">
      Generate a schedule to see stats.
    </div>
  </div>

</div>

<hr>

<div style="display:flex;gap:40px;margin-top:30px">

<!-- COLUMN 1 : SCHEDULE -->

<div style="flex:2">
<div id="schedule"></div>
</div>


<!-- COLUMN 2 : PLAYER NAMES -->

<div id="playerTools" style="flex:1; display:none">

<h3>Paste Men Names</h3>

<textarea id="menPaste" rows="10" style="width:100%"
placeholder="Paste men names here..."></textarea>

<button onclick="applyMenNames()">Apply Names</button>

<div id="menNames"></div>

<br>

<h3>Paste Women Names</h3>

<textarea id="womenPaste" rows="8" style="width:100%"
placeholder="Paste women names here..."></textarea>

<button onclick="applyWomenNames()">Apply Names</button>

<div id="womenNames"></div>

</div>


<!-- COLUMN 3 : PLAYER LOOKUP -->

<div id="playerLookup" style="flex:1; display:none">

<h3>Find Player</h3>

<select id="playerSelect" style="width:100%"></select>

<br><br>

<button onclick="lookupPlayer()">Show Schedule</button>

<br><br>

<div id="playerResults"></div>

</div>

</div>

<div id="shareBox" style="display:none; margin-top:20px; padding:10px; border:1px solid #ccc;">
    
    <strong>Share this schedule:</strong><br><br>

    <input id="shareLink" style="width:70%; padding:5px;" readonly>

    <button onclick="copyLink()">Copy Link</button>

    <button onclick="window.open(document.getElementById('shareLink').value,'_blank')">
        Open
    </button>

</div>

<script>
function resetNames(){
  playerMap = {}
  document.getElementById("menPaste").value=""
  document.getElementById("womenPaste").value=""
  document.getElementById("menNames").innerHTML=""
  document.getElementById("womenNames").innerHTML=""
  document.getElementById("playerSelect").innerHTML=""
  document.getElementById("playerResults").innerHTML=""
  document.getElementById("leagueStatsContent").innerHTML = "Generate a schedule to see stats."

}

let playerMap = {}
async function generate(){
playerMap = {}
const menEnabled=document.getElementById("menCheck").checked
const womenEnabled=document.getElementById("womenCheck").checked

const menCount=parseInt(document.getElementById("menCount").value)||0
const womenCount=parseInt(document.getElementById("womenCount").value)||0

const leagueStartDate=document.getElementById("leagueStartDate").value
const leagueEndDate=document.getElementById("leagueEndDate").value
const daysOfWeek=[...document.querySelectorAll(".dow:checked")].map(d=>d.value)

const startTime=document.getElementById("startTime").value

const placement=document.getElementById("placement").value


//
// VALIDATION
//


const response = await fetch("/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
menEnabled,
womenEnabled,
menCount,
womenCount,
leagueStartDate,
leagueEndDate,
startTime,
placement,
daysOfWeek
})
})

const data=await response.json()

if (data.error) {
  alert(data.error);
  return;
}

window.currentSchedule=data.season
renderLeagueStats(data, menCount, womenCount)

document.getElementById("playerTools").style.display="block"
document.getElementById("playerLookup").style.display="block"

createNameFields(menCount,womenCount)
populatePlayerDropdown(menCount,womenCount)

let html="<h2>Schedule</h2>";

html+="<table border='1'>"

//
// HEADER
//

html+="<tr><th>Date</th>"

const firstWeek=data.season[0]

firstWeek.slots.forEach(slot=>{
html+=`<th>${slot.time}</th>`
html+=`<th>${slot.time}</th>`
})

html+="</tr>"

//
// WEEK ROWS
//

data.season.forEach(week=>{

html+=`<tr><td>${week.play_date}</td>`

week.slots.forEach(slot=>{

const g=slot.group

const players = g.map(p => playerMap[p] || p)

if(players.length === 4){
html+=`<td>${players[0]} - ${players[1]}</td>`
html+=`<td>${players[2]} - ${players[3]}</td>`
}

else if(players.length === 3){
html+=`<td>${players[0]} - ${players[1]}</td>`
html+=`<td>${players[2]}</td>`
}

else if(players.length === 2){
html+=`<td>${players[0]}</td>`
html+=`<td>${players[1]}</td>`
}

else{
html+=`<td colspan="2">${players.join(" - ")}</td>`
}

})

html+="</tr>"

})

html+="</table>"

document.getElementById("schedule").innerHTML=html

}

function createNameFields(menCount,womenCount){
  let menHTML="<h4>Men</h4>"
  for(let i=1;i<=menCount;i++){
  menHTML+=`${i} <input id="m${i}" placeholder="Name"><br>`
  }
  document.getElementById("menNames").innerHTML=menHTML
  let womenHTML="<h4>Women</h4>"
  for(let i=0;i<womenCount;i++){
  const letter=String.fromCharCode(65+i)
  womenHTML+=`${letter} <input id="w${letter}" placeholder="Name"><br>`
  }
  document.getElementById("womenNames").innerHTML=womenHTML
  }

function populatePlayerDropdown(menCount,womenCount){
  let html=""
  for(let i=1;i<=menCount;i++){
  const name = playerMap[i] || i
  html+=`<option value="${i}">${name}</option>`
  }
  for(let i=0;i<womenCount;i++){
  const letter=String.fromCharCode(65+i)
  const name = playerMap[letter] || letter
  html+=`<option value="${letter}">${name}</option>`
  }
  document.getElementById("playerSelect").innerHTML=html
  }

function lookupPlayer(){
  const player=document.getElementById("playerSelect").value
  let results="<h3>Week Schedule</h3>"
  let partnerCounts={}
  window.currentSchedule.forEach(week=>{
  week.slots.forEach(slot=>{
  const g=slot.group
  if(g.includes(player)){

  const others = g.filter(p => p !== player)

  let partner = others[0] || null
  let foursome = others.slice(1)

  const partnerName = partner ? (playerMap[partner] || partner) : "None"
  const otherNames = foursome.map(o => playerMap[o] || o)

  results+=`
  ${week.play_date} - ${slot.time}<br>
  Ride With: ${partnerName}<br>
  Foursome: ${otherNames.join(", ")}<br><br>
  `
  // track partner frequency
  g.forEach(p=>{
  if(p!==player){
  partnerCounts[p]=(partnerCounts[p]||0)+1
  }
  })
  }
  })
  })

  //
  // Season summary
  //

  results+="<h3>Played With</h3>"
  const sortedPartners = Object.entries(partnerCounts)
  .sort((a,b)=>b[1]-a[1])
  sortedPartners.forEach(([p,count])=>{
  const name = playerMap[p] || p
  results+=`${name} — ${count} times<br>`
  })
  document.getElementById("playerResults").innerHTML=results
  }

function applyMenNames(){
  const text=document.getElementById("menPaste").value
  const names=text.split("\n").map(n=>n.trim()).filter(n=>n!="")
  const menCount=parseInt(document.getElementById("menCount").value)
  if(names.length<menCount){
  alert(`You pasted ${names.length} names but ${menCount} men are required.`)
  }
  names.forEach((name,i)=>{
  const id = (i+1).toString()
  const field=document.getElementById("m"+id)
  if(field){
  field.value=name
  }
  playerMap[id]=name
  })
  }

function applyWomenNames(){
  const text=document.getElementById("womenPaste").value
  const names=text.split("\n").map(n=>n.trim()).filter(n=>n!="")
  const womenCount=parseInt(document.getElementById("womenCount").value)
  if(names.length<womenCount){
  alert(`You pasted ${names.length} names but ${womenCount} women are required.`)
  }
  names.forEach((name,i)=>{
  const letter=String.fromCharCode(65+i)
  const field=document.getElementById("w"+letter)
  if(field){
  field.value=name
  }
  playerMap[letter]=name
  })
  }

async function exportExcel(){

  if(!window.currentSchedule){
  alert("Generate a schedule first.")
  return
  }

  const menCount=parseInt(document.getElementById("menCount").value)||0
  const womenCount=parseInt(document.getElementById("womenCount").value)||0

  const payload={
  season:window.currentSchedule,
  playerMap:playerMap,
  menCount,
  womenCount
  }

  const response = await fetch("/export",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(payload)
  })

  const blob = await response.blob()

  const url = window.URL.createObjectURL(blob)

  const a = document.createElement("a")
  a.href=url
  a.download="golf_league_schedule.xlsx"

  document.body.appendChild(a)
  a.click()

  a.remove()

  }

function renderLeagueStats(data, menCount, womenCount){

const totalGolfers = (menCount || 0) + (womenCount || 0)
const totalRounds = data.season.length
const teeTimesPerRound = data.season.length > 0 ? data.season[0].slots.length : 0

const menCoverage = data.summary?.men_coverage?.coverage_pct ?? "-"
const womenCoverage = data.summary?.women_coverage?.coverage_pct ?? "-"

document.getElementById("leagueStatsContent").innerHTML = `
  <div><strong>Total Golfers:</strong> ${totalGolfers}</div>
  <div><strong>Total Rounds:</strong> ${totalRounds}</div>
  <div><strong>Tee Times / Round:</strong> ${teeTimesPerRound}</div>
  <div><strong>Men Pair Coverage:</strong> ${menCoverage}%</div>
  <div><strong>Women Pair Coverage:</strong> ${womenCoverage}%</div>
`
}

async function saveSchedule(){

if(!window.currentSchedule){
alert("Generate a schedule first.")
return
}

const league = prompt("League name")
const year = prompt("Year")

const payload={
league_name:league,
year:year,
season:window.currentSchedule,
playerMap:playerMap
}

const response = await fetch("/snapshot",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
})

const data = await response.json()

const link = window.location.origin + "/" + data.link

document.getElementById("shareLink").value = link
document.getElementById("shareBox").style.display = "block"

}

function copyLink(){

const link=document.getElementById("shareLink")

link.select()
link.setSelectionRange(0,99999)

navigator.clipboard.writeText(link.value)

alert("Link copied!")
}


document.getElementById("menCount").addEventListener("change", resetNames)
document.getElementById("womenCount").addEventListener("change", resetNames)

document.getElementById("menCheck").addEventListener("change", resetNames)
document.getElementById("womenCheck").addEventListener("change", resetNames)
</script>
</body>
</html>
